<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Queen</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at center, #12001f, #000);
    }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/FontLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/geometries/TextGeometry.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);
camera.position.z = 35;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 1));

// Sphere
const sphereGeometry = new THREE.SphereGeometry(6, 64, 64);
const sphereMaterial = new THREE.MeshBasicMaterial({
    color: 0xff1493,
    transparent: true,
    opacity: 0.15
});
const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
scene.add(sphere);

// Glowing Outline
const edges = new THREE.EdgesGeometry(sphereGeometry);
const outlineMaterial = new THREE.LineBasicMaterial({ color: 0xff69b4 });
const outline = new THREE.LineSegments(edges, outlineMaterial);
sphere.add(outline);

let textParticles;
let originalPositions = [];
let dispersed = false;

const loader = new THREE.FontLoader();

loader.load(
"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/helvetiker_regular.typeface.json",
function (font) {

    const textGeometry = new THREE.TextGeometry(
        "My Queen, My Veronica, My Queen",
        {
            font: font,
            size: 2,
            height: 0.1,
            curveSegments: 12,
        }
    );

    textGeometry.center();

    const positions = textGeometry.attributes.position;
    const points = [];

    for (let i = 0; i < positions.count; i++) {
        const x = positions.getX(i);
        const y = positions.getY(i);
        const z = positions.getZ(i);

        points.push(x, y, z);
        originalPositions.push({ x, y, z });
    }

    const particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(points, 3)
    );

    const particleMaterial = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.2,
    });

    textParticles = new THREE.Points(particleGeometry, particleMaterial);
    textParticles.position.y = -10;

    scene.add(textParticles);
}
);

window.addEventListener("click", () => {
    dispersed = !dispersed;
});

function animate() {
    requestAnimationFrame(animate);

    sphere.rotation.y += 0.002;

    if (textParticles) {
        const positions = textParticles.geometry.attributes.position;

        for (let i = 0; i < positions.count; i++) {

            let target = originalPositions[i];

            if (dispersed) {
                positions.setXYZ(
                    i,
                    positions.getX(i) + (Math.random() - 0.5) * 0.8,
                    positions.getY(i) + (Math.random() - 0.5) * 0.8,
                    positions.getZ(i) + (Math.random() - 0.5) * 0.8
                );
            } else {
                positions.setXYZ(
                    i,
                    positions.getX(i) + (target.x - positions.getX(i)) * 0.05,
                    positions.getY(i) + (target.y - positions.getY(i)) * 0.05,
                    positions.getZ(i) + (target.z - positions.getZ(i)) * 0.05
                );
            }
        }

        positions.needsUpdate = true;
    }

    renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
